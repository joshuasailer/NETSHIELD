name: Confidence Blacklist

on:
  schedule:
    - cron: '15 0 * * *'    # täglich 00:15 UTC (15 Min nach Combined)
    - cron: '15 3 * * *'    # täglich 03:15 UTC (15 Min nach Combined-Lauf um 03:00)
    - cron: '15 6 * * *'    # täglich 06:15 UTC (15 Min nach Combined-Lauf um 06:00)
    - cron: '15 9 * * *'    # täglich 09:15 UTC
    - cron: '15 12 * * *'   # täglich 12:15 UTC
    - cron: '15 15 * * *'   # täglich 15:15 UTC
    - cron: '15 18 * * *'   # täglich 18:15 UTC
    - cron: '15 21 * * *'   # täglich 21:15 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          # FIX: restore-keys matcht jetzt alle Varianten die Combined schreibt
          # Combined speichert: netshield-seen-db-v1-<run_id>
          # Durch restore-keys holen wir immer den neuesten verfügbaren Cache
          key: netshield-seen-db-v1-latest
          restore-keys: |
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Build Confidence Blacklists from seen_db
        run: |
          python3 << 'EOF'
          import json, os
          from datetime import datetime, timezone, timedelta

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          DB_FILE    = "seen_db.json"
          BLACKLIST  = "combined_threat_blacklist_ipv4.txt"
          OUT_40     = "blacklist_confidence40_ipv4.txt"
          OUT_WATCH  = "watchlist_confidence20to39_ipv4.txt"

          if not os.path.exists(DB_FILE):
              print(f"FEHLER: {DB_FILE} nicht gefunden – bitte zuerst Update Combined Blacklist ausführen.")
              exit(1)

          with open(DB_FILE) as f:
              db = json.load(f)
          print(f"seen_db geladen: {len(db)} IPs")

          # Alter der seen_db prüfen – warnen wenn zu alt
          newest_last = max((d.get("last","2000-01-01") for d in db.values()), default="2000-01-01")
          try:
              newest_dt = datetime.strptime(newest_last, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              db_age_hours = (now - newest_dt).total_seconds() / 3600
              print(f"seen_db aktuellster Eintrag: {newest_last} ({db_age_hours:.1f}h alt)")
              if db_age_hours > 6:
                  print(f"WARNUNG: seen_db ist {db_age_hours:.1f}h alt – Cache möglicherweise veraltet!")
          except:
              pass

          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              exit(1)

          with open(BLACKLIST) as f:
              combined_ips = {l.strip() for l in f if l.strip() and not l.startswith("#")}
          print(f"Combined Blacklist: {len(combined_ips)} IPs")

          # ── Konfidenz-Berechnung ──────────────────────────────────────────
          #
          # Basis-Score:
          #   HQ-Feed (hq=True)          → 60
          #   Non-HQ mit 3+ Feeds        → 45   ← NEU: Stufen statt pauschal 40
          #   Non-HQ mit 2 Feeds         → 35
          #   Non-HQ mit 1 Feed          → 20
          #
          # Aktivitäts-Bonus (addiert):
          #   Letzte Aktivität ≤ 3 Tage  → +25
          #   Letzte Aktivität ≤ 7 Tage  → +20
          #   Letzte Aktivität ≤ 14 Tage → +15
          #   Letzte Aktivität ≤ 30 Tage → +10
          #   Letzte Aktivität > 30 Tage → +0
          #
          # Persistenz-Bonus (addiert):
          #   Bekannt ≥ 60 Tage          → +15
          #   Bekannt ≥ 30 Tage          → +10
          #   Bekannt ≥ 14 Tage          → +5
          #
          # Ziel: conf ≥ 40 → blacklist_confidence40
          #        conf 20–39 → watchlist_confidence20to39
          #        conf < 20  → ignoriert (noch nicht ausreichend bestätigt)

          confidence40 = []
          confidence20 = []
          skipped      = 0

          for ip, data in db.items():
              if ip not in combined_ips:
                  continue

              is_hq       = data.get("hq", False)
              feed_count  = len(data.get("feeds", []))
              last_seen   = data.get("last",  "2000-01-01")
              first_seen  = data.get("first", last_seen)

              try:
                  last_dt  = datetime.strptime(last_seen,  "%Y-%m-%d").replace(tzinfo=timezone.utc)
                  first_dt = datetime.strptime(first_seen, "%Y-%m-%d").replace(tzinfo=timezone.utc)
              except:
                  skipped += 1
                  continue

              days_since_last = (now - last_dt).days
              days_known      = (last_dt - first_dt).days + 1

              # Basis
              if is_hq:
                  conf = 60
              elif feed_count >= 3:
                  conf = 45
              elif feed_count >= 2:
                  conf = 35
              else:
                  conf = 20

              # Aktivitäts-Bonus
              if days_since_last <= 3:
                  conf += 25
              elif days_since_last <= 7:
                  conf += 20
              elif days_since_last <= 14:
                  conf += 15
              elif days_since_last <= 30:
                  conf += 10
              # > 30 Tage: kein Bonus

              # Persistenz-Bonus
              if days_known >= 60:
                  conf += 15
              elif days_known >= 30:
                  conf += 10
              elif days_known >= 14:
                  conf += 5

              conf = min(conf, 100)

              if conf >= 40:
                  confidence40.append((ip, conf))
              elif conf >= 20:
                  confidence20.append((ip, conf))

          confidence40.sort(key=lambda x: (-x[1], x[0]))
          confidence20.sort(key=lambda x: (-x[1], x[0]))

          print(f"Konfidenz ≥40%:   {len(confidence40)} IPs")
          print(f"Konfidenz 20-39%: {len(confidence20)} IPs")
          print(f"Übersprungen:     {skipped} IPs (Datumsfehler)")

          with open(OUT_40, "w") as f:
              f.write(f"# NETSHIELD Blacklist – Hohe Konfidenz (≥40%)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Eintraege: {len(confidence40)}\n\n")
              for ip, conf in confidence40:
                  f.write(f"{ip}\n")

          with open(OUT_WATCH, "w") as f:
              f.write(f"# NETSHIELD Watchlist – Mittlere Konfidenz (20-39%)\n")
              f.write(f"# Aktualisiert: {now_str}\n")
              f.write(f"# Eintraege: {len(confidence20)}\n\n")
              for ip, conf in confidence20:
                  f.write(f"{ip}\n")

          print(f"Fertig: {len(confidence40)} IPs (≥40%) | {len(confidence20)} IPs (20-39%)")
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blacklist_confidence40_ipv4.txt watchlist_confidence20to39_ipv4.txt
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Confidence Blacklist: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
