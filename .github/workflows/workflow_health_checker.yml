name: Workflow Health Checker

on:
  schedule:
    - cron: '15 1 * * *'   # täglich 01:15 UTC (15 Min nach Feed Health Monitor 01:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check-python-code:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Check Python Code in all Workflow Files
        run: |
          python3 << 'EOF'
          import re, textwrap, os, json, ast, sys
          from datetime import datetime, timezone

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          WORKFLOWS_DIR = ".github/workflows"
          if not os.path.isdir(WORKFLOWS_DIR):
              WORKFLOWS_DIR = "."

          files = sorted(f for f in os.listdir(WORKFLOWS_DIR) if f.endswith(".yml"))
          print(f"Workflows gefunden: {len(files)}\n")

          errors   = []
          warnings = []
          results  = {}

          # ── Bekannte tote URLs ────────────────────────────────────────────
          DEAD_URLS = [
              ("spamhaus.org/drop/edrop.txt",
               "edrop seit 10.04.2024 abgeschaltet – Daten in spamhaus_drop enthalten"),
              ("phishing.army",
               "Domain-Liste, keine IPs – liefert immer 0 IPs"),
              ("romainmarcoux/malicious-ip/main/full-300k-ac.txt",
               "Datei existiert nicht mehr – HTTP 200 mit leerem Body"),
              ("emergingthreats.net/fwrules/emerging-Block-IPs.txt",
               "robots.txt-geblockt – et_ips ist immer leer, et_bonus immer 0"),
          ]

          # ── Check 1: Cron-Kollisionen & doppelte Namen ────────────────────
          cron_map = {}
          name_map = {}
          for fname in files:
              content = open(f"{WORKFLOWS_DIR}/{fname}").read()
              for cron in re.findall(r"cron: '(.+?)'", content):
                  cron_map.setdefault(cron, []).append(fname)
              m = re.search(r"^name:\s*(.+)", content, re.M)
              if m:
                  name_map.setdefault(m.group(1).strip(), []).append(fname)

          for cron, wfs in cron_map.items():
              if len(wfs) > 1:
                  warnings.append({
                      "file": " + ".join(wfs),
                      "check": "Cron-Kollision",
                      "detail": f"'{cron}' – beide Workflows laufen gleichzeitig",
                  })

          for name, wfs in name_map.items():
              if len(wfs) > 1:
                  errors.append({
                      "file": " + ".join(wfs),
                      "check": "Doppelter Workflow-Name",
                      "detail": f'name: "{name}" – concurrency-group schlägt fehl, Runs blockieren sich',
                  })

          # ── Pro Datei ─────────────────────────────────────────────────────
          for fname in files:
              path    = f"{WORKFLOWS_DIR}/{fname}"
              content = open(path).read()
              file_errors   = []
              file_warnings = []

              # Python-Blöcke aus YAML-Heredocs extrahieren
              blocks = re.findall(r"python3 << 'EOF'(.*?)\n\s*EOF\b", content, re.DOTALL)

              for i, block in enumerate(blocks):
                  dedented = textwrap.dedent(block)

                  # ── Check 2: Python-Syntax ─────────────────────────────────
                  try:
                      compile(dedented, f"{fname}:block{i}", "exec", ast.PyCF_ONLY_AST)
                  except SyntaxError as e:
                      msg = f"Block {i} Zeile {e.lineno}: SyntaxError – {e.msg} → `{(e.text or '').strip()}`"
                      file_errors.append(msg)
                      errors.append({"file": fname, "check": "SyntaxError", "detail": msg})
                      continue

                  # ── Check 3: Tote URLs ─────────────────────────────────────
                  for url_frag, reason in DEAD_URLS:
                      if url_frag in dedented:
                          msg = f"Block {i}: tote URL '{url_frag}' – {reason}"
                          file_errors.append(msg)
                          errors.append({"file": fname, "check": "Tote URL", "detail": msg})

                  # ── Check 4: sys.exit ohne import sys ─────────────────────
                  if "sys.exit" in dedented and "import sys" not in dedented:
                      msg = f"Block {i}: sys.exit() verwendet aber 'import sys' fehlt → NameError"
                      file_errors.append(msg)
                      errors.append({"file": fname, "check": "Fehlender Import", "detail": msg})

                  # ── Check 5: open(..., "w") ohne encoding ─────────────────
                  for m in re.finditer(r'open\([^)]+,\s*["\']w["\']\s*\)', dedented):
                      snippet = dedented[max(0, m.start()-30):m.end()]
                      if "encoding" not in snippet:
                          msg = f"Block {i}: open(..., 'w') ohne encoding= – UnicodeEncodeError auf nicht-UTF8-Systemen"
                          file_warnings.append(msg)
                          warnings.append({"file": fname, "check": "Encoding fehlt", "detail": msg})
                          break

                  # ── Check 6: json.load ohne try/except ────────────────────
                  if "json.load(" in dedented and "try:" not in dedented:
                      msg = f"Block {i}: json.load() ohne try/except – crash bei korrupter Datei"
                      file_warnings.append(msg)
                      warnings.append({"file": fname, "check": "Fehlende Fehlerbehandlung", "detail": msg})

                  # ── Check 7: del db[ip] in aktiver for-Schleife ────────────
                  # Muster: for ip in db.keys(): ... del db[ip]  ohne list()
                  if re.search(r'for \w+ in db\.keys\(\).*?del db\[', dedented, re.DOTALL):
                      if "list(db.keys())" not in dedented:
                          msg = f"Block {i}: 'del db[ip]' in for-Schleife über db.keys() ohne list() – RuntimeError"
                          file_errors.append(msg)
                          errors.append({"file": fname, "check": "Dict-Mutation in Schleife", "detail": msg})

                  # ── Check 8: ThreadPoolExecutor ohne timeout ───────────────
                  for m in re.finditer(r'as_completed\(futures\)', dedented):
                      snippet = dedented[m.start():m.start()+60]
                      if "timeout=" not in snippet:
                          msg = f"Block {i}: as_completed(futures) ohne timeout= – hängt bei totem Feed ewig"
                          file_warnings.append(msg)
                          warnings.append({"file": fname, "check": "as_completed ohne timeout", "detail": msg})
                          break

              # ── Check 9: git push ohne rebase (Shell-Teil) ────────────────
              shell_blocks = re.findall(r"run: \|(.*?)(?=\n      - name:|\n  [a-z]|\Z)", content, re.DOTALL)
              for part in shell_blocks:
                  if "git push" in part and "rebase" not in part:
                      msg = "git push ohne pull --rebase – Race-Condition bei parallelen Runs"
                      file_warnings.append(msg)
                      warnings.append({"file": fname, "check": "Git Push ohne Rebase", "detail": msg})
                      break

              # ── Check 10: concurrency fehlt bei scheduled Workflow ─────────
              if "schedule" in content and "concurrency:" not in content:
                  msg = "Kein concurrency-Block – parallele Runs möglich bei manuell + scheduled gleichzeitig"
                  file_warnings.append(msg)
                  warnings.append({"file": fname, "check": "Concurrency fehlt", "detail": msg})

              results[fname] = {
                  "blocks":   len(blocks),
                  "errors":   file_errors,
                  "warnings": file_warnings,
                  "cron":     re.findall(r"cron: '(.+?)'", content),
              }

              icon = "❌" if file_errors else ("⚠️" if file_warnings else "✅")
              print(f"{icon} {fname}: {len(blocks)} Block(s) | "
                    f"{len(file_errors)} Fehler | {len(file_warnings)} Warnungen")

          # ── Zusammenfassung ───────────────────────────────────────────────
          ok_count   = sum(1 for v in results.values() if not v["errors"] and not v["warnings"])
          warn_count = sum(1 for v in results.values() if v["warnings"] and not v["errors"])
          err_count  = sum(1 for v in results.values() if v["errors"])

          print(f"\nGesamt: ✅ {ok_count} OK | ⚠️ {warn_count} Warnungen | ❌ {err_count} Fehler")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# Workflow Health Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append(f"**Workflows:** {len(files)} | ✅ {ok_count} OK | "
                       f"⚠️ {warn_count} Warnung | ❌ {err_count} Fehler\n")
          lines.append("---")

          if errors:
              lines.append("## ❌ Fehler (kritisch)\n")
              lines.append("| Datei | Check | Detail |")
              lines.append("|---|---|---|")
              for e in errors:
                  lines.append(f"| `{e['file']}` | {e['check']} | {e['detail']} |")
              lines.append("")

          if warnings:
              lines.append("## ⚠️ Warnungen\n")
              lines.append("| Datei | Check | Detail |")
              lines.append("|---|---|---|")
              for w in warnings:
                  lines.append(f"| `{w['file']}` | {w['check']} | {w['detail']} |")
              lines.append("")

          lines.append("## Übersicht\n")
          lines.append("| Workflow | Status | Fehler | Warnungen | Cron |")
          lines.append("|---|---|---|---|---|")
          for fname, r in results.items():
              icon  = "❌" if r["errors"] else ("⚠️" if r["warnings"] else "✅ OK")
              crons = ", ".join(f"`{c}`" for c in r["cron"]) if r["cron"] else "–"
              lines.append(f"| `{fname}` | {icon} | {len(r['errors'])} | {len(r['warnings'])} | {crons} |")

          lines.append(f"\n---\n*Generiert: {now_str} | {len(files)} Workflow-Dateien geprüft*")

          with open("workflow_health_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("workflow_health_report.md geschrieben")

          with open("workflow_health_status.json", "w", encoding="utf-8") as f:
              json.dump({
                  "updated":  now_str,
                  "total":    len(files),
                  "ok":       ok_count,
                  "warn":     warn_count,
                  "error":    err_count,
                  "errors":   errors,
                  "warnings": warnings,
              }, f, indent=2)

          if err_count > 0:
              print(f"\nFEHLER: {err_count} kritische Probleme gefunden!")
              sys.exit(1)
          EOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workflow_health_report.md workflow_health_status.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
          else
            git commit -m "Workflow Health Checker: $(date -u '+%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
