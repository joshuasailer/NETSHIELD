name: False Positive Checker

on:
  schedule:
    - cron: '0 5 * * *'    # täglich 05:00 UTC (60 Min vor Combined um 06:00 – verhindert Git-Konflikt)
    - cron: '0 13 * * *'   # täglich 13:00 UTC (60 Min Puffer vor Combined um 15:00)
    - cron: '0 20 * * *'   # täglich 20:00 UTC (60 Min Puffer vor Combined um 21:00)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none


concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  fp-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Restore seen_db Cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest
          restore-keys: |
            netshield-seen-db-v1-
            netshield-seen-db-

      - name: Check Blacklist for False Positives
        run: |
          python3 << 'EOF'
          import re
          import os
          import sys
          import ipaddress
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")

          # Whitelist-CIDR-Check – Reverse-DNS nicht aktiv
          print("Starte False Positive Prüfung (Whitelist-CIDR)...")

          # ── Bekannte legitime IP-Ranges (Whitelist) ───────────────────────
          # Nur einzelne IPs die als False Positive aufgetaucht sind.
          # Keine ganzen CIDR-Ranges – User verwalten eigene Ausnahmen in der Firewall.
          WHITELIST_CIDRS = [
              # Shopify CDN
              "185.111.111.154", "185.111.111.155", "185.111.111.156",
              "185.111.111.157", "185.111.111.158", "185.111.111.159",
              # Tucows / OpenSRS
              "192.64.87.219",
              # Google Cloud / Spotify (GCP)
              "141.8.194.242",
              "35.186.224.24",
              # GitHub Pages / CDN
              "185.199.109.133", "185.199.111.133",
              # Shopify CDN
              "23.227.38.65",
              # Microsoft (OneDrive/Teams)
              "52.109.89.119",
              # Telekom Deutschland
              "80.146.236.47",
              # Google Services
              "172.217.16.196", "172.217.16.206", "172.217.20.132", "172.217.16.195",
              "142.251.127.190", "142.251.208.164",
              # Hurricane Electric
              "184.105.99.75",
              # Shopify
              "160.79.104.10",
              # Facebook / Meta
              "157.240.253.35",
              # Legitimer Hoster
              "91.228.167.128", "91.228.166.47",
              # Cloudflare
              "104.18.32.47", "172.64.155.209",
              # GitHub
              "140.82.112.0/20",
              # Quad9 DNS (alle IPv4-Adressen, alle Dienstvarianten)
              "9.9.9.9", "149.112.112.112",    # Secure (mit Malware-Blocking)
              "9.9.9.10", "149.112.112.10",    # Unsecured (ohne Blocking)
              "9.9.9.11", "149.112.112.11",    # Secure + ECS

              # ── E-Mail-Anbieter Deutschland ────────────────────────────────
              # GMX (United Internet / Ionos) – Quelle: postmaster.gmx.com
              "212.227.15.15", "212.227.15.18", "212.227.15.19",  # mout.gmx.net
              "212.227.17.20", "212.227.17.21", "212.227.17.22",  # mout.gmx.net
              "212.227.15.44", "212.227.15.45", "212.227.15.46",  # mout-bounce.gmx.net
              "212.227.17.26", "212.227.17.28", "212.227.17.29",  # mout-bounce.gmx.net
              "82.165.159.12", "82.165.159.13", "82.165.159.14",  # mout-xforward.gmx.net
              "82.165.159.40", "82.165.159.41", "82.165.159.42",  # mout-xforward.gmx.net

              # WEB.DE (United Internet) – Quelle: postmaster.web.de
              "212.227.15.3",  "212.227.15.4",  "212.227.15.5",   # mout.web.de
              "212.227.15.6",  "212.227.15.14", "212.227.17.11",  # mout.web.de
              "212.227.17.12", "217.72.192.78",                   # mout.web.de
              "217.72.192.77",                                     # mout-bounce.web.de
              "212.227.15.25", "212.227.15.26", "212.227.15.29",  # mout-bounce.web.de
              "212.227.15.54", "212.227.15.55", "212.227.17.18",  # mout-bounce.web.de
              "212.227.17.19",                                     # mout-bounce.web.de
              "82.165.159.2",  "82.165.159.3",  "82.165.159.4",   # mout-xforward.web.de
              "82.165.159.34", "82.165.159.35", "82.165.159.45",  # mout-xforward.web.de

              # IONOS / 1&1 – Quelle: ionos.com/help/email/postmaster
              "217.72.192.73", "217.72.192.74", "217.72.192.75",  # mout.kundenserver.de
              "212.227.17.13", "212.227.17.24",                   # mout.kundenserver.de
              "212.227.126.130", "212.227.126.131", "212.227.126.133",
              "212.227.126.134", "212.227.126.135", "212.227.126.187",
              "74.208.4.194",  "74.208.4.195",  "74.208.4.196",  "74.208.4.197",  # mout.perfora.net
              "82.165.159.5",  "82.165.159.6",  "82.165.159.7",  # mout-xforward.kundenserver.de
              "82.165.159.8",  "82.165.159.9",  "82.165.159.10",
              "82.165.159.36", "82.165.159.37", "82.165.159.38",
              "82.165.159.39", "82.165.159.43", "82.165.159.44",
              "82.165.159.132","82.165.159.133","82.165.159.134", # mout-xforward.perfora.net
              "217.72.192.100","217.72.192.101","217.72.192.102", # mout-bounce.kundenserver.de
              "212.227.15.22", "212.227.15.31", "212.227.15.32",
              "212.227.15.56", "212.227.15.57", "212.227.15.58",
              "212.227.17.3",  "212.227.17.14", "212.227.17.25",
              "74.208.4.198",  "74.208.4.204",  "74.208.4.205",  # mout-bounce.perfora.net
              "212.227.15.53", "212.227.15.47",                   # mout-csbulk.1and1.com
              "212.227.126.220","212.227.126.221","212.227.126.222","212.227.126.223",
              "212.227.126.224","212.227.126.225","212.227.126.226","212.227.126.227",
              "212.227.15.50", "212.227.15.52",                   # mout-cscorp.1and1.com
              "212.227.15.7",  "212.227.15.8",  "212.227.17.7",  "212.227.17.27", # moint.1and1.com

              # Posteo (Berlin, datenschutzfreundlich)
              "185.67.36.0/24",

              # mailbox.org (Berlin)
              "80.241.60.0/24",

              # Telekom / T-Online Mail
              "194.25.0.0/16",       # Deutsche Telekom Mailserver-Range

              # ── E-Mail-Anbieter International ──────────────────────────────
              # Gmail / Google Workspace – SPF: _spf.google.com
              "74.125.0.0/16",       # Gmail Mailserver
              "209.85.128.0/17",     # Gmail Mailserver

              # Microsoft Outlook / Hotmail / Office 365 – SPF: spf.protection.outlook.com
              "40.92.0.0/15",        # Outlook.com / Hotmail
              "40.107.0.0/16",       # Outlook.com
              "52.100.0.0/15",       # Office 365
              "52.102.0.0/16",       # Office 365
              "52.103.0.0/17",       # Office 365
              "104.47.0.0/17",       # Office 365

              # Yahoo Mail – SPF: _spf.mail.yahoo.com
              "98.136.0.0/14",       # Yahoo Mail
              "66.196.0.0/17",       # Yahoo Mail
              "66.228.160.0/19",     # Yahoo Mail
              "74.6.0.0/16",         # Yahoo Mail

              # Apple iCloud Mail
              "17.0.0.0/8",          # Apple (iCloud, iMessage, FaceTime)

              # ProtonMail / Proton (Schweiz)
              "185.70.40.0/24",
              "185.70.41.0/24",

              # Tutanota / Tuta (Deutschland, Hannover)
              "23.21.86.0/24",
          ]

          whitelist_networks = []
          for cidr in WHITELIST_CIDRS:
              try:
                  whitelist_networks.append(ipaddress.ip_network(cidr, strict=False))
              except:
                  pass

          def is_whitelisted(ip):
              try:
                  addr = ipaddress.ip_address(ip)
                  return any(addr in net for net in whitelist_networks)
              except:
                  return False

          # ── Blacklist laden ───────────────────────────────────────────────
          BLACKLIST = "combined_threat_blacklist_ipv4.txt"
          if not os.path.exists(BLACKLIST):
              print(f"FEHLER: {BLACKLIST} nicht gefunden!")
              sys.exit(1)

          with open(BLACKLIST) as f:
              lines_raw = f.readlines()

          blacklist_ips = []
          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#"):
                  blacklist_ips.append(ip)

          print(f"\nBlacklist geladen: {len(blacklist_ips)} IPs")
          print("Prüfe auf False Positives...")

          # ── False-Positive-Erkennung (nur Whitelist-CIDR) ────────────────
          false_positives   = []
          whitelist_hits    = []
          reverse_dns_legit = []

          print(f"Prüfe {len(blacklist_ips)} IPs gegen Whitelist...")
          for i, ip in enumerate(blacklist_ips):
              if is_whitelisted(ip):
                  whitelist_hits.append((ip, "Bekannte legitime IP-Range (CDN/Cloud)"))
                  false_positives.append(ip)

          print(f"  Fertig. {len(false_positives)} False Positives gefunden.")

          print(f"\nFalse Positives gefunden: {len(false_positives)}")
          print(f"  Whitelist-Treffer:    {len(whitelist_hits)}")
          print(f"  Reverse-DNS-Legit:    {len(reverse_dns_legit)}")

          # ── False Positives aus Blacklist entfernen ───────────────────────
          fp_set = set(false_positives)
          cleaned_lines = []
          removed_count = 0

          for line in lines_raw:
              ip = line.strip()
              if ip and not ip.startswith("#") and ip in fp_set:
                  removed_count += 1
                  continue  # rauslassen
              cleaned_lines.append(line)

          if removed_count > 0:
              with open(BLACKLIST, "w", encoding="utf-8") as f:
                  f.writelines(cleaned_lines)
              print(f"Blacklist bereinigt: {removed_count} False Positives entfernt")

              # ── seen_db ebenfalls bereinigen ──────────────────────────────
              # Ohne diesen Schritt trägt combined beim nächsten Lauf die
              # Whitelist-IPs sofort wieder ein → Bereinigung wäre wirkungslos.
              # FIX Bug2: HQ-IPs NICHT aus seen_db löschen!
              # HQ-Feeds (Feodo, Talos etc.) melden diese IPs weiterhin → combined
              # würde sie im nächsten Lauf sofort wieder eintragen (Lösch-Reinsert-Zyklus).
              # Stattdessen: HQ-IPs bleiben in seen_db, werden aber aus der Blacklist-Datei
              # entfernt – combined schreibt sie beim nächsten Lauf ggf. wieder rein,
              # was korrekt ist wenn der HQ-Feed sie aktiv meldet.
              DB_FILE = "seen_db.json"
              if os.path.exists(DB_FILE):
                  import json
                  try:
                      with open(DB_FILE) as f:
                          db = json.load(f)
                      db_removed = 0
                      db_skipped_hq = 0
                      for ip in fp_set:
                          if ip in db:
                              if db[ip].get("hq", False):
                                  db_skipped_hq += 1
                                  print(f"  SKIP seen_db-Löschung für {ip} (HQ-IP)")
                                  continue
                              del db[ip]
                              db_removed += 1
                      if db_removed > 0:
                          with open(DB_FILE, "w") as f:
                              json.dump(db, f, separators=(",", ":"))
                          print(f"seen_db bereinigt: {db_removed} False Positives entfernt"
                                f" | {db_skipped_hq} HQ-IPs behalten")
                  except Exception as e:
                      print(f"seen_db konnte nicht bereinigt werden: {e}")
          else:
              print("Keine False Positives gefunden")

          # ── False Positive Liste speichern ────────────────────────────────
          with open("false_positives_log.txt", "a", encoding="utf-8") as f:
              f.write(f"\n# Scan: {now_str} – {removed_count} entfernt\n")
              for ip in false_positives:
                  f.write(f"{ip}\n")

          # ── Report ────────────────────────────────────────────────────────
          lines = []
          lines.append("# False Positive Checker – Report")
          lines.append(f"**Aktualisiert:** {now_str}\n")
          lines.append("---")
          lines.append("## Ergebnis\n")
          lines.append(f"| Metrik | Wert |")
          lines.append(f"|---|---|")
          lines.append(f"| Geprüfte IPs (gesamt) | {len(blacklist_ips)} |")
          lines.append(f"| Whitelist-Treffer | **{len(whitelist_hits)}** |")
          lines.append(f"| Gesamt entfernt | **{removed_count}** |")

          if whitelist_hits:
              lines.append("")
              lines.append("## Whitelist-Treffer\n")
              lines.append("| IP | Grund |")
              lines.append("|---|---|")
              for ip, reason in whitelist_hits[:20]:
                  lines.append(f"| `{ip}` | {reason} |")

          lines.append(f"\n---\n*Generiert: {now_str}*")

          with open("false_positive_report.md", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          print("false_positive_report.md geschrieben")
          EOF

      - name: Save seen_db Cache (nach FP-Bereinigung)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-fp-${{ github.run_id }}

      - name: Save seen_db Cache (latest alias)
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: seen_db.json
          key: netshield-seen-db-v1-latest

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add false_positives_log.txt false_positive_report.md combined_threat_blacklist_ipv4.txt
          git diff --staged --quiet || git commit -m "False Positive Check abgeschlossen [$(date -u '+%Y-%m-%d %H:%M') UTC]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push origin HEAD:${GITHUB_REF_NAME}
