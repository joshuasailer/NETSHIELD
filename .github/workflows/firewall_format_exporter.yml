name: Firewall Format Exporter

on:
  schedule:
    - cron: '30 0 * * *'    # täglich 00:30 UTC (30 Min nach Combined)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: read
  issues: none
  packages: none
  pull-requests: none
  security-events: none

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: true

      - name: Generate Firewall Export Files
        run: |
          python3 << 'EOF'
          import os
          import re
          import csv
          import json
          import gzip
          import bz2
          import lzma
          import zipfile
          import ipaddress
          from datetime import datetime, timezone
          import xml.etree.ElementTree as ET

          now     = datetime.now(timezone.utc)
          now_str = now.strftime("%Y-%m-%d %H:%M UTC")
          now_iso = now.strftime("%Y-%m-%dT%H:%M:%SZ")

          IPV4_RE = re.compile(r'\b((?:\d{1,3}\.){3}\d{1,3})\b')
          SUPPORTED_EXTENSIONS = [
              ".txt", ".csv", ".json", ".xml", ".ipset", ".conf", ".sh", ".list", ".dat",
              ".gz", ".zip", ".bz2", ".xz"
          ]

          def is_valid_public_ipv4(ip):
              try:
                  obj = ipaddress.ip_address(ip)
                  return (
                      obj.version == 4 and
                      not obj.is_private and
                      not obj.is_loopback and
                      not obj.is_multicast and
                      not obj.is_reserved and
                      not obj.is_link_local and
                      not obj.is_unspecified
                  )
              except Exception:
                  return False

          def extract_ips_from_text(text):
              ips = []
              seen = set()
              for match in IPV4_RE.finditer(text):
                  ip = match.group(1)
                  if is_valid_public_ipv4(ip) and ip not in seen:
                      ips.append(ip)
                      seen.add(ip)
              return ips

          def read_text_file(path):
              with open(path, "r", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def read_gzip_file(path):
              with gzip.open(path, "rt", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def read_bz2_file(path):
              with bz2.open(path, "rt", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def read_xz_file(path):
              with lzma.open(path, "rt", encoding="utf-8", errors="ignore") as f:
                  return f.read()

          def read_zip_file(path):
              collected = []
              with zipfile.ZipFile(path, "r") as zf:
                  for member in zf.infolist():
                      if member.is_dir():
                          continue
                      try:
                          with zf.open(member, "r") as fh:
                              collected.append(fh.read().decode("utf-8", errors="ignore"))
                      except Exception as ex:
                          print(f"WARNUNG: ZIP-Eintrag {member.filename} konnte nicht gelesen werden: {ex}")
              return "\n".join(collected)

          def parse_json_file(path):
              with open(path, "r", encoding="utf-8", errors="ignore") as f:
                  data = json.load(f)

              ips = []
              seen = set()

              def walk(value):
                  if isinstance(value, dict):
                      for v in value.values():
                          walk(v)
                  elif isinstance(value, list):
                      for item in value:
                          walk(item)
                  elif isinstance(value, str):
                      for ip in extract_ips_from_text(value):
                          if ip not in seen:
                              ips.append(ip)
                              seen.add(ip)

              walk(data)
              return ips

          def parse_csv_file(path):
              ips = []
              seen = set()
              with open(path, "r", encoding="utf-8", errors="ignore", newline="") as f:
                  reader = csv.reader(f)
                  for row in reader:
                      for cell in row:
                          for ip in extract_ips_from_text(cell):
                              if ip not in seen:
                                  ips.append(ip)
                                  seen.add(ip)
              return ips

          def parse_xml_file(path):
              ips = []
              seen = set()
              try:
                  tree = ET.parse(path)
                  root = tree.getroot()
                  text_content = "\n".join(elem.text or "" for elem in root.iter())
                  for ip in extract_ips_from_text(text_content):
                      if ip not in seen:
                          ips.append(ip)
                          seen.add(ip)
                  return ips
              except Exception:
                  return extract_ips_from_text(read_text_file(path))

          def load_ips_from_file(path):
              lower = path.lower()
              if lower.endswith(".json"):
                  return parse_json_file(path)
              if lower.endswith(".csv"):
                  return parse_csv_file(path)
              if lower.endswith(".xml"):
                  return parse_xml_file(path)
              if lower.endswith(".gz"):
                  return extract_ips_from_text(read_gzip_file(path))
              if lower.endswith(".bz2"):
                  return extract_ips_from_text(read_bz2_file(path))
              if lower.endswith(".xz"):
                  return extract_ips_from_text(read_xz_file(path))
              if lower.endswith(".zip"):
                  return extract_ips_from_text(read_zip_file(path))
              return extract_ips_from_text(read_text_file(path))

          def find_blacklist_file():
              preferred_bases = [
                  "active_blacklist_ipv4",
                  "combined_threat_blacklist_ipv4",
                  "active_blacklist",
                  "combined_threat_blacklist",
              ]
              for base in preferred_bases:
                  direct_candidates = [base] + [base + ext for ext in SUPPORTED_EXTENSIONS]
                  for candidate in direct_candidates:
                      if os.path.exists(candidate):
                          return candidate

              for entry in sorted(os.listdir(".")):
                  if not os.path.isfile(entry):
                      continue
                  if any(entry.endswith(ext) for ext in SUPPORTED_EXTENSIONS):
                      lowered = entry.lower()
                      if any(token in lowered for token in ["blacklist", "blocklist", "threat", "malicious", "active"]):
                          return entry
              return None

          BLACKLIST = find_blacklist_file()
          if not BLACKLIST:
              print("FEHLER: Keine unterstützte Blacklist-Datei gefunden!")
              exit(1)

          try:
              ips = load_ips_from_file(BLACKLIST)
          except Exception as ex:
              print(f"FEHLER: Blacklist-Datei konnte nicht gelesen werden ({BLACKLIST}): {ex}")
              exit(1)

          if not ips:
              print("WARNUNG: Blacklist leer – Export übersprungen.")
              exit(0)

          print(f"Blacklist geladen: {len(ips)} IPs (aus {BLACKLIST})")
          os.makedirs("firewall_exports", exist_ok=True)

          # 1. JSON
          with open("firewall_exports/blacklist.json", "w") as f:
              json.dump({"name": "NETSHIELD Active Blacklist", "updated": now_iso,
                         "source": "https://github.com/juergen2025sys/NETSHIELD",
                         "input_file": BLACKLIST,
                         "count": len(ips), "ips": ips}, f, indent=2)
          print(f"  OK: blacklist.json ({len(ips)} IPs)")

          # 2. CSV
          with open("firewall_exports/blacklist.csv", "w", encoding="utf-8") as f:
              f.write("ip,type,source,updated\n")
              for ip in ips:
                  f.write(f"{ip},IPv4,NETSHIELD,{now_str}\n")
          print(f"  OK: blacklist.csv")

          # 3. iptables
          with open("firewall_exports/blacklist_iptables.sh", "w") as f:
              f.write(f"#!/bin/bash\n# NETSHIELD Blacklist – iptables | {now_str}\n")
              f.write("iptables -F NETSHIELD 2>/dev/null || iptables -N NETSHIELD\n")
              f.write("iptables -C INPUT -j NETSHIELD 2>/dev/null || iptables -I INPUT -j NETSHIELD\n")
              f.write("iptables -C FORWARD -j NETSHIELD 2>/dev/null || iptables -I FORWARD -j NETSHIELD\n\n")
              for ip in ips:
                  f.write(f"iptables -A NETSHIELD -s {ip} -j DROP\n")
          print(f"  OK: blacklist_iptables.sh")

          # 4. nftables
          with open("firewall_exports/blacklist_nftables.conf", "w") as f:
              f.write(f"# NETSHIELD Blacklist – nftables | {now_str}\n")
              f.write("table inet netshield {\n    set blacklist_ipv4 {\n        type ipv4_addr\n        flags interval\n        elements = {\n")
              for chunk in [ips[i:i+10] for i in range(0, len(ips), 10)]:
                  f.write("            " + ", ".join(chunk) + ",\n")
              f.write("        }\n    }\n    chain input {\n        type filter hook input priority 0; policy accept;\n        ip saddr @blacklist_ipv4 drop\n    }\n}\n")
          print(f"  OK: blacklist_nftables.conf")

          # 5. pfSense / OPNsense XML
          with open("firewall_exports/blacklist_pfsense_opnsense.xml", "w") as f:
              f.write('<?xml version="1.0"?>\n')
              f.write(f'<!-- NETSHIELD Blacklist | {now_str} -->\n<aliases>\n  <alias>\n')
              f.write('    <n>NETSHIELD_Blacklist</n>\n    <type>host</type>\n')
              f.write(f'    <description>NETSHIELD Active Blacklist – {now_str}</description>\n')
              f.write(f'    <address>{" ".join(ips)}</address>\n')
              f.write(f'    <detail>{"||".join(f"NETSHIELD {ip}" for ip in ips)}</detail>\n')
              f.write('  </alias>\n</aliases>\n')
          print(f"  OK: blacklist_pfsense_opnsense.xml")

          # 6. Cisco ACL
          with open("firewall_exports/blacklist_cisco_acl.txt", "w", encoding="utf-8") as f:
              f.write(f"! NETSHIELD Blacklist – Cisco ACL | {now_str}\nip access-list extended NETSHIELD_BLACKLIST\n")
              for ip in ips:
                  f.write(f" deny   ip host {ip} any log\n")
              f.write(" permit ip any any\n")
          print(f"  OK: blacklist_cisco_acl.txt")

          # 7. Mikrotik
          with open("firewall_exports/blacklist_mikrotik.rsc", "w") as f:
              f.write(f"# NETSHIELD Blacklist – Mikrotik RouterOS | {now_str}\n")
              f.write("/ip firewall address-list remove [find list=NETSHIELD_Blacklist]\n\n")
              for ip in ips:
                  f.write(f'/ip firewall address-list add list=NETSHIELD_Blacklist address={ip} comment="NETSHIELD"\n')
          print(f"  OK: blacklist_mikrotik.rsc")

          # 8. Windows Firewall PowerShell
          with open("firewall_exports/blacklist_windows_firewall.ps1", "w") as f:
              f.write(f"# NETSHIELD Blacklist – Windows Firewall | {now_str}\n")
              f.write('Remove-NetFirewallRule -DisplayName "NETSHIELD_Blacklist" -ErrorAction SilentlyContinue\n')
              f.write("$ips = @(\n")
              for chunk in [ips[i:i+10] for i in range(0, len(ips), 10)]:
                  f.write('    "' + '","'.join(chunk) + '",\n')
              f.write(")\nNew-NetFirewallRule -DisplayName \"NETSHIELD_Blacklist\" -Direction Inbound -Action Block -RemoteAddress $ips\n")
          print(f"  OK: blacklist_windows_firewall.ps1")

          # README
          with open("firewall_exports/README.md", "w", encoding="utf-8") as f:
              f.write(f"# NETSHIELD Firewall Exports\n\n**Aktualisiert:** {now_str}  \n**IPs:** {len(ips)}\n**Quelle:** `{BLACKLIST}`\n\n")
              f.write("## Unterstützte Eingabeformate\n\n")
              f.write("`.txt`, `.csv`, `.json`, `.xml`, `.ipset`, `.conf`, `.sh`, `.list`, `.dat`, `.gz`, `.zip`, `.bz2`, `.xz`\n\n")
              f.write("| Datei | Format | Verwendung |\n|---|---|---|\n")
              f.write("| `blacklist.json` | JSON | APIs, SIEM |\n")
              f.write("| `blacklist.csv` | CSV | Excel, Datenbanken |\n")
              f.write("| `blacklist_iptables.sh` | iptables | Linux |\n")
              f.write("| `blacklist_nftables.conf` | nftables | Linux (modern) |\n")
              f.write("| `blacklist_pfsense_opnsense.xml` | XML Alias | pfSense / OPNsense |\n")
              f.write("| `blacklist_cisco_acl.txt` | Cisco ACL | Cisco IOS |\n")
              f.write("| `blacklist_mikrotik.rsc` | RouterOS | Mikrotik |\n")
              f.write("| `blacklist_windows_firewall.ps1` | PowerShell | Windows |\n\n")
              f.write(f"*Generiert von NETSHIELD Firewall Format Exporter · {now_str}*\n")

          print(f"\nAlle Exporte fertig: 8 Formate × {len(ips)} IPs")
          EOF

      - name: Commit Exports (mit Git LFS für große Dateien)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Git LFS für Dateien > 50 MB aktivieren
          git lfs install --skip-smudge 2>/dev/null || true
          git lfs track "firewall_exports/blacklist.csv"                  2>/dev/null || true
          git lfs track "firewall_exports/blacklist_iptables.sh"          2>/dev/null || true
          git lfs track "firewall_exports/blacklist_mikrotik.rsc"         2>/dev/null || true
          git lfs track "firewall_exports/blacklist_cisco_acl.txt"        2>/dev/null || true
          git lfs track "firewall_exports/blacklist_pfsense_opnsense.xml" 2>/dev/null || true
          git add .gitattributes 2>/dev/null || true

          git add firewall_exports/
          if git diff --staged --quiet; then
            echo "Keine Änderungen"
            exit 0
          fi

          git commit -m "Firewall Format Exporter: $(date -u '+%Y-%m-%d %H:%M') UTC"

          # Retry-Schleife: bis zu 5 Versuche bei gleichzeitigen Commits anderer Workflows
          for attempt in 1 2 3 4 5; do
            echo "Push-Versuch $attempt..."
            git fetch origin ${GITHUB_REF_NAME}
            if git rebase -X theirs origin/${GITHUB_REF_NAME}; then
              if git push origin HEAD:${GITHUB_REF_NAME}; then
                echo "Push erfolgreich (Versuch $attempt)"
                exit 0
              fi
            else
              # Konflikt: unsere neu generierten Export-Dateien gewinnen immer
              git checkout --theirs firewall_exports/ 2>/dev/null || true
              git add firewall_exports/
              GIT_EDITOR=true git rebase --continue 2>/dev/null || git rebase --skip
            fi
            sleep $((attempt * 5))
          done
          echo "FEHLER: Push nach 5 Versuchen fehlgeschlagen"
          exit 1
